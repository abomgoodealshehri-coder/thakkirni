<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تطبيق تذكير صوتي</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007bff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>
:جذر {
--الأساسي: #2b78c5؛
--primary-hover: #1e5a99;
--bg-gradient: linear-gradient(135deg, #eef5fc 0%, #dbe9f6 100%);
--card-bg: #ffffff;
--text-main: #333333;
}

* {
box-sizing: border-box;
عائلة الخطوط: 'Segoe UI'، Tahoma، Jennifer، Verdana، sans-serif؛
الهامش: 0؛
الحشو: 0؛
}

جسم {
الخلفية: فار(--bg-gradient);
اللون: متغير(--text-main)؛
الحد الأدنى للارتفاع: 100vh؛
العرض: مرن؛
justify-content: center;
align-items: center;
الحشو: 20 بكسل؛
}

.app-container {
الخلفية: var(--card-bg);
border-radius: 24px;
box-shadow: 0 12px 40px rgba(0,0,0,0.08);
العرض: 100%؛
أقصى عرض: 450 بكسل؛
الحشو: 30 بكسل؛
text-align: center;
}

h2 {
اللون: متغير(--الأساسي)؛
margin-bottom: 25px;
حجم الخط: 1.6 ريم؛
}

.form-group {
margin-bottom: 20px;
text-align: right;
}

ملصق {
العرض: كتلة؛
margin-bottom: 8px;
وزن الخط: 600؛
اللون: 555؛
حجم الخط: 0.95 ريم؛
}

input[type="text"], input[type="datetime-local"] {
العرض: 100%؛
الحشو: 14 بكسل؛
border: 2px solid #e0e0e0;
border-radius: 12px;
حجم الخط: 1 ريم؛
text-align: right;
الانتقال: لون الحدود 0.3 ثانية؛
المخطط: لا يوجد؛
}

input:focus {
لون الحدود: متغير(--الأساسي)؛
}

.quick-buttons {
العرض: شبكة؛
grid-template-columns: repeat(3, 1fr);
الفجوة: 10 بكسل؛
margin-top: 10px;
}

.btn-quick {
الخلفية: #f0f4f8؛
الحدود: لا شيء؛
الحشو: 10 بكسل؛
border-radius: 8px;
حجم الخط: 0.85 ريم؛
المؤشر: مؤشر؛
وزن الخط: 500؛
اللون: #444؛
الانتقال: جميعها 0.2 ثانية؛
}

.btn-quick:hover {
الخلفية: #dbe9f6؛
اللون: متغير(--الأساسي)؛
}

.btn-main {
الخلفية: متغير(--الأساسي)؛
اللون: أبيض؛
الحدود: لا شيء؛
العرض: 100%؛
الحشو: 15 بكسل؛
border-radius: 14px;
حجم الخط: 1.1 ريم؛
وزن الخط: غامق؛
المؤشر: مؤشر؛
margin-top: 15px;
box-shadow: 0 4px 15px rgba(43, 120, 197, 0.3);
الانتقال: الخلفية 0.2 ثانية؛
}

.btn-main:hover {
الخلفية: فار(--primary-hover);
}

.btn-secondary {
الخلفية: #f7f9fc;
border: 2px solid #e2e8f0;
اللون: #4a5568؛
العرض: 100%؛
الحشو: 12 بكسل؛
border-radius: 12px;
حجم الخط: 0.95 ريم؛
المؤشر: مؤشر؛
margin-top: 10px;
وزن الخط: 500؛
}

.reminders-list {
margin-top: 30px;
text-align: right;
}

.reminders-list h3 {
حجم الخط: 1.1 ريم؛
border-bottom: 2px solid #f0f4f8;
padding-bottom: 8px;
margin-bottom: 15px;
اللون: #444؛
}

.reminder-item {
الخلفية: #f8fafc؛
الحشو: 12 بكسل 15 بكسل؛
border-radius: 10px;
margin-bottom: 10px;
العرض: مرن؛
justify-content: space-between;
align-items: center;
border-right: 4px solid var(--primary);
}

.reminder-info span {
العرض: كتلة؛
حجم الخط: 0.85 ريم؛
اللون: #718096؛
margin-top: 4px;
}

.btn-delete {
الخلفية: لا شيء؛
الحدود: لا شيء؛
اللون: #e53e3e؛
المؤشر: مؤشر؛
حجم الخط: 0.9 ريم؛
وزن الخط: غامق؛
}
</style>
</head>
<body>

<div class="app-container">
<h2>📝 ماذا تريد أن أذكّرك؟</h2>

<div class="form-group">
<label>نص التذكير:</label>
<input type="text" id="reminderText" placeholder="مثال: سبحان الله والحمد لله" value="سبحان الله والحمد لله">
</div>

<div class="form-group">
<label>متى تبي التذكير؟ (اليوم والساعة):</label>
<input type="datetime-local" id="reminderTime">

<div class="quick-buttons">
<button class="btn-quick" onclick="setQuickTime(1)">بعد دقيقة</button>
<button class="btn-quick" onclick="setQuickTime(5)">بعد حمام السباحة</button>
<button class="btn-quick" onclick="setQuickTime(60)">بعد الساعة</button>
</div>
</div>

<button class="btn-main" onclick="addReminder()">🚀 إضافة التذكير</button>
<button class="btn- Secondary" onclick="testAudio()">🔊 تجربة الصوت والبدء</button>

<div class="reminders-list">
<h3>التذكيرات العضوية (<span id="count">0</span>)</h3>
<div id="listContainer"></div>
</div>
</div>

<script>
let reminds = JSON.parse(localStorage.getItem('reminders')) || [];
let swRegistration = null;

// 1. تسجيل الـ Service Worker ليعمل في الخلفية والجوال مقفل
إذا كان ('serviceWorker' موجودًا في navigator و'Notification' موجودًا في window) {
window.addEventListener('load', () => {
navigator.serviceWorker.register('sw.js')
.then((reg) => {
swRegistration = reg;
console.log('تم تسجيل عامل الخدمة بفعالية!');
إذا كانت صلاحية الإشعارات هي "افتراضية" {
Notification.requestPermission();
}
}).catch(err => console.log('فشل تسجيل الـ Service Worker:', err));
});
}

// ضبط الوقت الافتراضي بعد القرآن الكريم للتجربة
window.onload = () => {
setQuickTime(1);
renderReminders();
};

دالة setQuickTime(minutes) {
const now = new Date();
now.setMinutes(now.getMinutes() + minutes);
// تحويل الوقت لصيغة لتسويق البحث المحلي
const year = now.getFullYear();
const month = String(now.getMonth() + 1).padStart(2, '0');
const day = String(now.getDate()).padStart(2, '0');
const hours = String(now.getHours()).padStart(2, '0');
const minutesStr = String(now.getMinutes()).padStart(2, '0');

document.getElementById('reminderTime').value = `${year}-${month}-${day}T${hours}:${minutesStr}`;
}

// تفعيل الصوت المبدئي لحظر الإصدار
دالة اختبار الصوت() {
talk("تم تفعيل نظام الصوت الفعال، جرب جدول التنبيه الآن");
}

دالة التحدث(النص) {
إذا كان ('speechSynthesis' موجودًا في النافذة) {
window.speechSynthesis.cancel(); // إيقاف أي صوت متبقي
const utterance = new SpeechSynthesisUtterance(text);
utterance.lang = 'ar-SA';
معدل الكلام = 0.9؛ // سرعة النطق
window.speechSynthesis.speak(utterance);
}
}

دالة إضافة تذكير () {
const textInput = document.getElementById('reminderText').value.trim();
const timeInput = document.getElementById('reminderTime').value;

إذا لم يكن حقل إدخال النص أو حقل إدخال الوقت موجودًا،
تنبيه("الرجاء النص نص التذكير والوقت!");
يعود؛
}

const targetTimestamp = new Date(timeInput).getTime();
const delay = targetTimestamp - Date.now();

إذا كان (التأخير <= 0) {
تنبيه("الرجاء اختيار وقت في المستقبل!");
يعود؛
}

const remind = {
المعرّف: التاريخ.الآن()،
نص: إدخال نصي،
الوقت: إدخال الوقت،
الطابع الزمني: الطابع الزمني المستهدف،
تم الطرد: خطأ
};

reminds.push(reminder);
saveReminders();
renderReminders();

// إرسال التذكير إلى الـ Service Worker لجدولته في الخلفية (للجوال والشاشة مقفلة)
إذا كان (swRegistration && Notification.permission === 'granted') {
navigator.serviceWorker.ready.then((reg) => {
إذا كان (reg.active) {
reg.active.postMessage({
النوع: 'SCHEDULE_NOTIFICATION'،
العنوان: '⏰ حان وقت التذكير',
نص الإدخال: textInput,
التأخير: التأخير
});
}
});
}

تنبيه("🚀 تم إضافة التذكير وجدوله الفعال في الخلفية!");
}

دالة renderReminders() {
حاوية const = document.getElementById('listContainer');
const countSpan = document.getElementById('count');
container.innerHTML = '';

const activeReminders = reminds.filter(r => !r.fired);
countSpan.innerText = activeReminders.length;

activeReminders.forEach(r => {
const dateStr = new Date(r.timestamp).toLocaleString('ar-SA');
const item = document.createElement('div');
item.className = 'reminder-item';
item.innerHTML = `
<div class="reminder-info">
<strong>${r.text}</strong>
<span>${dateStr}</span>
</div>
<button class="btn-delete" onclick="deleteReminder(${ r.id })"> حذف</button>
`;
container.appendChild(item);
});
}

دالة حذف التذكير (id) {
التذكيرات = التذكيرات.تصفية(r => r.id !== id);
saveReminders();
renderReminders();
}

دالة حفظ التذكيرات() {
localStorage.setItem('reminders', JSON.stringify(reminders));
}

// العديد من الاختبارات المحلية يعمل في حال كان التطبيق متاحاً بالأمام لتشغيل النطق الصوتي للرصيد
setInterval(() => {
const now = Date.now();
reminds.forEach(r => {
إذا لم يتم إطلاق العملية وكان الوقت الحالي أكبر من أو يساوي الطابع الزمني للعملية،
r.fired = true;
speak(r.text);
saveReminders();
renderReminders();
}
});
}, 1000);
</script>

</body>
</html>
