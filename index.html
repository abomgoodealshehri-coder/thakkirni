<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تطبيق ذكّرني الصوتي</title>
<!-- ربط ملف الـ PWA Manifest -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007bff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>
:root {
--primary: #2b78c5;
--primary-hover: #1e5a99;
--bg-gradient: linear-gradient(135deg, #eef5fc 0%, #dbe9f6 100%);
--card-bg: #ffffff;
--text-main: #333333;
}

* {
box-sizing: border-box;
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
margin: 0;
padding: 0;
}

body {
background: var(--bg-gradient);
color: var(--text-main);
min-height: 100vh;
display: flex;
justify-content: center;
align-items: center;
padding: 20px;
}

.app-container {
background: var(--card-bg);
border-radius: 24px;
box-shadow: 0 12px 40px rgba(0,0,0,0.08);
width: 100%;
max-width: 450px;
padding: 30px;
text-align: center;
}

h2 {
color: var(--primary);
margin-bottom: 25px;
font-size: 1.6rem;
}

.form-group {
margin-bottom: 20px;
text-align: right;
}

label {
display: block;
margin-bottom: 8px;
font-weight: 600;
color: #555;
font-size: 0.95rem;
}

input[type="text"], input[type="datetime-local"] {
width: 100%;
padding: 14px;
border: 2px solid #e0e0e0;
border-radius: 12px;
font-size: 1rem;
text-align: right;
transition: border-color 0.3s;
outline: none;
}

input:focus {
border-color: var(--primary);
}

.quick-buttons {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 10px;
margin-top: 10px;
}

.btn-quick {
background: #f0f4f8;
border: none;
padding: 10px;
border-radius: 8px;
font-size: 0.85rem;
cursor: pointer;
font-weight: 500;
color: #444;
transition: all 0.2s;
}

.btn-quick:hover {
background: #dbe9f6;
color: var(--primary);
}

.btn-main {
background: var(--primary);
color: white;
border: none;
width: 100%;
padding: 15px;
border-radius: 14px;
font-size: 1.1rem;
font-weight: bold;
cursor: pointer;
margin-top: 15px;
box-shadow: 0 4px 15px rgba(43, 120, 197, 0.3);
transition: background 0.2s;
}

.btn-main:hover {
background: var(--primary-hover);
}

.btn-secondary {
background: #f7f9fc;
border: 2px solid #e2e8f0;
color: #4a5568;
width: 100%;
padding: 12px;
border-radius: 12px;
font-size: 0.95rem;
cursor: pointer;
margin-top: 10px;
font-weight: 500;
}

.reminders-list {
margin-top: 30px;
text-align: right;
}

.reminders-list h3 {
font-size: 1.1rem;
border-bottom: 2px solid #f0f4f8;
padding-bottom: 8px;
margin-bottom: 15px;
color: #444;
}

.reminder-item {
background: #f8fafc;
padding: 12px 15px;
border-radius: 10px;
margin-bottom: 10px;
display: flex;
justify-content: space-between;
align-items: center;
border-right: 4px solid var(--primary);
}

.reminder-info span {
display: block;
font-size: 0.85rem;
color: #718096;
margin-top: 4px;
}

.btn-delete {
background: none;
border: none;
color: #e53e3e;
cursor: pointer;
font-size: 0.9rem;
font-weight: bold;
}
</style>
</head>
<body>

<div class="app-container">
<h2>📝 ماذا تريد أن أذكّرك؟</h2>

<div class="form-group">
<label>نص التذكير:</label>
<input type="text" id="reminderText" placeholder="مثال: سبحان الله والحمد لله" value="سبحان الله والحمد لله">
</div>

<div class="form-group">
<label>متى تبي التذكير؟ (اليوم والساعة):</label>
<input type="datetime-local" id="reminderTime">

<div class="quick-buttons">
<button class="btn-quick" onclick="setQuickTime(1)">بعد دقيقة</button>
<button class="btn-quick" onclick="setQuickTime(5)">بعد ٥ دقائق</button>
<button class="btn-quick" onclick="setQuickTime(60)">بعد ساعة</button>
</div>
</div>

<button class="btn-main" onclick="addReminder()">🚀 إضافة التذكير</button>
<button class="btn-secondary" onclick="testAudio()">🔊 تجربة الصوت والبدء</button>

<div class="reminders-list">
<h3>التذكيرات النشطة (<span id="count">0</span>)</h3>
<div id="listContainer"></div>
</div>
</div>

<script>
let reminders = JSON.parse(localStorage.getItem('reminders')) || [];
let swRegistration = null;

// 1. تسجيل الـ Service Worker ليعمل في الخلفية والجوال مقفل
if ('serviceWorker' in navigator && 'Notification' in window) {
window.addEventListener('load', () => {
navigator.serviceWorker.register('sw.js')
.then((reg) => {
swRegistration = reg;
console.log('Service Worker تم تسجيله بنجاح!');
if (Notification.permission === 'default') {
Notification.requestPermission();
}
}).catch(err => console.log('فشل تسجيل الـ Service Worker:', err));
});
}

// تعيين الوقت الافتراضي بعد دقيقة تسهيلاً للتجربة
window.onload = () => {
setQuickTime(1);
renderReminders();
};

function setQuickTime(minutes) {
const now = new Date();
now.setMinutes(now.getMinutes() + minutes);

const year = now.getFullYear();
const month = String(now.getMonth() + 1).padStart(2, '0');
const day = String(now.getDate()).padStart(2, '0');
const hours = String(now.getHours()).padStart(2, '0');
const minutesStr = String(now.getMinutes()).padStart(2, '0');

document.getElementById('reminderTime').value = `${year}-${month}-${day}T${hours}:${minutesStr}`;
}

function testAudio() {
speak("تم تفعيل نظام الصوت بنجاح، جرب جدولة تنبيه الآن");
}

function speak(text) {
if ('speechSynthesis' in window) {
window.speechSynthesis.cancel();
const utterance = new SpeechSynthesisUtterance(text);
utterance.lang = 'ar-SA';
utterance.rate = 0.9;
window.speechSynthesis.speak(utterance);
}
}

function addReminder() {
const textInput = document.getElementById('reminderText').value.trim();
const timeInput = document.getElementById('reminderTime').value;

if (!textInput || !timeInput) {
alert("الرجاء إدخال نص التذكير والوقت!");
return;
}

const targetTimestamp = new Date(timeInput).getTime();
const delay = targetTimestamp - Date.now();

if (delay <= 0) {
alert("الرجاء اختيار وقت في المستقبل!");
return;
}

const reminder = {
id: Date.now(),
text: textInput,
time: timeInput,
timestamp: targetTimestamp,
fired: false
};

reminders.push(reminder);
saveReminders();
renderReminders();

// إرسال التذكير إلى الـ Service Worker لجدولته في الخلفية
if (swRegistration && Notification.permission === 'granted') {
navigator.serviceWorker.ready.then((reg) => {
if (reg.active) {
reg.active.postMessage({
type: 'SCHEDULE_NOTIFICATION',
title: '⏰ حان وقت التذكير',
body: textInput,
delay: delay
});
}
});
}

alert("🚀 تم إضافة التذكير وجدولته بنجاح في الخلفية!");
}

function renderReminders() {
const container = document.getElementById('listContainer');
const countSpan = document.getElementById('count');
container.innerHTML = '';

const activeReminders = reminders.filter(r => !r.fired);
countSpan.innerText = activeReminders.length;

activeReminders.forEach(r => {
const dateStr = new Date(r.timestamp).toLocaleString('ar-SA');
const item = document.createElement('div');
item.className = 'reminder-item';
item.innerHTML = `
<div class="reminder-info">
<strong>${r.text}</strong>
<span>${dateStr}</span>
</div>
<button class="btn-delete" onclick="deleteReminder(${r.id})">حذف</button>
`;
container.appendChild(item);
});
}

function deleteReminder(id) {
reminders = reminders.filter(r => r.id !== id);
saveReminders();
renderReminders();
}

function saveReminders() {
localStorage.setItem('reminders', JSON.stringify(reminders));
}

setInterval(() => {
const now = Date.now();
reminders.forEach(r => {
if (!r.fired && now >= r.timestamp) {
r.fired = true;
speak(r.text);
saveReminders();
renderReminders();
}
});
}, 1000);
</script>

</body>
</html>
